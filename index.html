<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEOVAULT — Country Explorer</title>
  <link href="./style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app" class="geovault dark">

    <nav class="gv-navbar">
      <div class="gv-logo">GEOVAULT</div>
      <div class="gv-navbar-center">
        <span class="gv-live-dot"></span>
        <span id="nav-count">0 COUNTRIES · REST COUNTRIES API</span>
      </div>
      <div class="gv-navbar-right">
        <button class="gv-theme-toggle" id="theme-toggle">LIGHT</button>
      </div>
    </nav>

    <div class="gv-controls">
      <div class="gv-search-wrapper">
        <input class="gv-search" id="search-input" type="text" placeholder="Search country, capital, or region...">
      </div>
      <div class="gv-filters" id="filters">
        <button class="gv-pill active">ALL</button>
        <button class="gv-pill">AFRICA</button>
        <button class="gv-pill">AMERICAS</button>
      </div>
    </div>

    <div class="gv-main">
      <div class="gv-grid" id="country-grid">
        <div class="gv-loading" id="loading" style="display:flex">
          <div class="gv-spinner"></div>
          Loading countries...
        </div>
      </div>
    </div>

  </div>
  <script src="./script.js"></script>
</body>
</html>
